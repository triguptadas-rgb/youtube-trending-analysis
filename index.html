<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Skyglass — Weather Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="noise"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">☁ SKYGLASS</div>
      <div class="tagline">real-time atmosphere</div>
    </header>

    <!-- Search -->
    <div class="search-bar">
      <input type="text" id="cityInput" placeholder="Enter city name..." autocomplete="off"/>
      <button id="searchBtn">→</button>
    </div>
    <div id="errorMsg" class="error-msg hidden">City not found. Try again.</div>

    <!-- Main weather card -->
    <div id="weatherCard" class="weather-card hidden">
      <div class="card-left">
        <div class="city-name" id="cityName">—</div>
        <div class="country" id="country"></div>
        <div class="temp-block">
          <div class="temp" id="temp">—</div>
          <div class="unit">°C</div>
        </div>
        <div class="desc" id="desc">—</div>
        <div class="feels" id="feels"></div>
      </div>
      <div class="card-right">
        <div class="weather-icon" id="weatherIcon">☀️</div>
        <div class="stats-grid">
          <div class="stat">
            <span class="stat-label">Humidity</span>
            <span class="stat-val" id="humidity">—</span>
          </div>
          <div class="stat">
            <span class="stat-label">Wind</span>
            <span class="stat-val" id="wind">—</span>
          </div>
          <div class="stat">
            <span class="stat-label">Visibility</span>
            <span class="stat-val" id="visibility">—</span>
          </div>
          <div class="stat">
            <span class="stat-label">Pressure</span>
            <span class="stat-val" id="pressure">—</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 5-Day Forecast -->
    <div id="forecastSection" class="forecast-section hidden">
      <div class="section-title">5-DAY FORECAST</div>
      <div class="forecast-grid" id="forecastGrid"></div>
    </div>

    <!-- API Key Notice -->
    <div class="api-notice">
      <span>⚠</span> Add your <strong>OpenWeatherMap API key</strong> in <code>app.js</code> to enable live data.
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
